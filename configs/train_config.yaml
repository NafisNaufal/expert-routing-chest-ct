# ── Model ────────────────────────────────────────────────────────────────────
model:
  name: "MONAI/Llama3-VILA-M3-8B"
  conv_mode: "llama_3"            # conversation template expected by VILA-M3
  attn_implementation: "flash_attention_2"  # fallback: "sdpa" if flash-attn unavailable

# ── LoRA ─────────────────────────────────────────────────────────────────────
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:                 # attention projection matrices, language model only
    - "q_proj"
    - "v_proj"
  bias: "none"
  task_type: "CAUSAL_LM"

# ── Data ─────────────────────────────────────────────────────────────────────
# NOTE: edit these to a partition with free space (server has ~241 GB total).
data:
  ctrate_root: "~/icsdg_data/ct_rate"          # CT-RATE report CSVs + staging
  lidc_root: "~/icsdg_data/lidc_idri"          # LIDC-IDRI volumes (NIfTI, kept for eval)
  processed_root: "~/icsdg_data/processed"     # extracted slices + JSON records
  holdout_fraction: 0.10                       # fraction of CT-RATE kept for retrieval eval
  max_volumes: 2000                            # CT-RATE train volumes to stream+process
  max_lidc_scans: 150                          # LIDC-IDRI scans for zero-shot eval
  max_slices: 16                               # key axial slices sampled per volume
  slice_size: 224                              # resize slices to this resolution

# ── Training ─────────────────────────────────────────────────────────────────
train:
  output_dir: "./checkpoints"
  num_epochs: 3
  per_device_batch_size: 1              # multimodal samples vary in #images — keep at 1
  gradient_accumulation_steps: 4        # effective batch size = 4
  learning_rate: 1.0e-4
  lr_scheduler: "cosine"
  warmup_ratio: 0.03
  weight_decay: 0.01
  max_grad_norm: 1.0
  bf16: true                            # A100 supports bf16
  save_strategy: "epoch"
  save_total_limit: 1                   # keep disk usage low (241 GB partition)
  logging_steps: 50
  dataloader_num_workers: 4
  seed: 42

# ── Evaluation ───────────────────────────────────────────────────────────────
eval:
  retrieval_k: [1, 5, 10]              # Recall@K values
  seg_metrics: ["dice", "iou"]         # segmentation-based detection metrics
  batch_size: 8
  index_path: "./retrieval_index"       # FAISS index saved here
